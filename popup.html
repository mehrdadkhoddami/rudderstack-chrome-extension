<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RudderStack Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
  <style>
    body { width: 480px; min-height: 520px; }

    .header {
      padding: 9px 11px;
      gap: 7px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--brand) 0%, #8B5CF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { fill: white; width: 13px; height: 13px; }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sent-color);
      box-shadow: 0 0 0 2px var(--sent-bg);
      animation: livePulse 2s ease infinite;
    }
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--sent-bg); }
      50%       { box-shadow: 0 0 0 4px transparent; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand-row">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="live-dot"></div>
    </div>

    <div class="filter-container">
      <input type="text" id="filter-input" placeholder="Filter events…" autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clear-btn">×</button>
    </div>

    <button id="clearButton" class="clear-button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
      Clear
    </button>
  </div>

  <div id="localStorage-items"></div>
  <script src="popup.js"></script>
</body>
</html>
